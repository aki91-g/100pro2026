name: Build and Push CI Image

on:
  push:
    branches: [ main ]
    paths:
      - 'docker/ci.Dockerfile'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
      - name: Build and push
        run: |
          TAG=ghcr.io/${{ github.repository_owner }}/tauri-ci:latest
          docker build -t $TAG -f docker/ci.Dockerfile .
          docker push $TAG